name : build and deploy

on:
  push:
    brances:
      - main


job:
  deploy:
    runs-on: ubuntu-latest

  steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: login to docker hub
      uses: docker/login-action@v3

      with:
        username: ${{ secret.DOCKER_USERNAME }}
        password: ${{ secret.DOCKER_PASSWORD }}

    - name: Build docker image
      run: docker build -t ${{ secrets.DOCKERHUB.USERNAME }}/static-website:latest .

    - name: push docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/static-website:latest 

  - name: Deploy to EC2
  uses: appleboy/ssh-action@v1.2.0
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USERNAME }}
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      docker pull ${{ secrets.DOCKER_USERNAME }}/static-website:latest

      docker stop website || true
      docker rm website || true

      docker run -d \
        --name website \
        -p 80:80 \
        ${{ secrets.DOCKER_USERNAME }}/static-website:latest
